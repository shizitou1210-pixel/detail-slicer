<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>详情图切片工具</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: rgba(255, 255, 255, .82);
      --solid-card: #ffffff;
      --text: #111111;
      --sub: #737780;
      --line: rgba(17, 24, 39, .08);
      --soft: #f5f6f8;
      --blue: #2563eb;
      --blue-hover: #1d4ed8;
      --green: #16a34a;
      --green-hover: #15803d;
      --orange: #f97316;
      --red: #ef4444;
      --radius: 18px;
      --shadow: 0 18px 46px rgba(15, 23, 42, .06);
      --preview-width: 440px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(37, 99, 235, .08), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(22, 163, 74, .07), transparent 26%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
    }

    .app {
      min-height: 100vh;
      padding: 18px;
    }

    .topbar {
      max-width: 960px;
      margin: 0 auto 12px;
      min-height: 74px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(17, 24, 39, .07);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: rgba(17, 17, 17, .045);
      color: #171717;
      border: 1px solid rgba(17, 17, 17, .06);
    }

    .brand-logo-svg {
      width: 22px;
      height: 24px;
      display: block;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
      letter-spacing: -.2px;
      white-space: nowrap;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-title {
      text-align: right;
      min-width: 190px;
    }

    .tool-title strong {
      display: block;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: -.4px;
    }

    .tool-title span {
      display: block;
      margin-top: 4px;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.35;
    }

    .pill {
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      background: #ecfdf5;
      color: #047857;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .layout {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(400px, 1fr) 340px;
      gap: 12px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(17, 24, 39, .075);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .preview-card {
      min-height: 600px;
    }

    .card-head {
      height: 46px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .52);
    }

    .card-head strong {
      font-size: 14px;
    }

    .mini-help {
      color: var(--sub);
      font-size: 12px;
      white-space: nowrap;
    }

    .head-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .upload-mini-btn {
      height: 28px;
      padding: 0 10px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: .15s ease;
      white-space: nowrap;
    }

    .upload-mini-btn:hover {
      border-color: #c0cad8;
      background: #f8fafc;
    }

    .preview-area {
      height: calc(100vh - 98px);
      min-height: 540px;
      overflow: auto;
      padding: 12px;
      background:
        linear-gradient(45deg, #f1f5f9 25%, transparent 25%),
        linear-gradient(-45deg, #f1f5f9 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f1f5f9 75%),
        linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0px;
    }

    .empty {
      height: 500px;
      border: 1.5px dashed rgba(148, 163, 184, .62);
      border-radius: 16px;
      background: rgba(255,255,255,.70);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 26px;
      color: var(--sub);
      line-height: 1.6;
      cursor: pointer;
      transition: .16s ease;
    }

    .empty:hover,
    .preview-area.drop-active .empty {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .empty-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #64748b;
      border: 1px solid #e5e7eb;
    }

    .empty-icon svg {
      width: 28px;
      height: 28px;
    }

    .empty b {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin: 0;
    }

    .empty-note {
      color: var(--sub);
      font-size: 13px;
      line-height: 1.5;
    }

    .preview-wrap {
      display: none;
      width: min(100%, var(--preview-width));
      margin: 0 auto;
    }


    .stage {
      position: relative;
      background: white;
      border: 1px solid rgba(17, 24, 39, .075);
      border-radius: 14px;
      line-height: 0;
      box-shadow: 0 16px 34px rgba(15, 23, 42, .10);
      user-select: none;
      overflow: visible;
    }

    #previewImg {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      border-radius: 10px;
    }

    #overlay {
      position: absolute;
      inset: 0;
      line-height: normal;
      cursor: crosshair;
      touch-action: none;
    }

    .slice-band {
      position: absolute;
      left: 0;
      width: 100%;
      background: rgba(15, 23, 42, .018);
      border-top: 1px solid rgba(148, 163, 184, .14);
      border-bottom: 1px solid rgba(148, 163, 184, .14);
      z-index: 1;
      pointer-events: none;
    }

    .cut-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 0;
      border-top: 1px solid rgba(249, 115, 22, .58);
      z-index: 4;
      cursor: ns-resize;
      filter: none;
      transition: border-color .15s ease;
    }

    .cut-line:hover {
      border-top-color: rgba(249, 115, 22, .95);
    }

    .cut-line::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -10px;
      height: 20px;
    }

    .line-label {
      position: absolute;
      left: 8px;
      top: -12px;
      height: 22px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .88);
      border: 1px solid rgba(249, 115, 22, .28);
      color: #9a3412;
      font-size: 11px;
      font-weight: 800;
      box-shadow: 0 4px 10px rgba(15, 23, 42, .06);
      white-space: nowrap;
      pointer-events: auto;
      opacity: .82;
      transition: opacity .15s ease, border-color .15s ease;
    }

    .cut-line:hover .line-label {
      opacity: 1;
      border-color: rgba(249, 115, 22, .52);
    }

    .line-handle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(249, 115, 22, .10);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
    }

    .line-delete {
      width: 16px;
      height: 16px;
      border: 0;
      border-radius: 50%;
      padding: 0;
      background: rgba(249, 115, 22, .12);
      color: #9a3412;
      font-weight: 900;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
    }

    .line-delete:hover {
      background: rgba(249, 115, 22, .22);
    }

    .side {
      position: sticky;
      top: 14px;
    }

    .panel {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel:last-child {
      border-bottom: 0;
    }

    .panel-title {
      margin-bottom: 9px;
      font-size: 13px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }


    .meta {
      display: none;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
    }

    .meta-row:last-child {
      border-bottom: 0;
    }

    .meta-row span:first-child {
      color: var(--sub);
    }

    .meta-row span:last-child {
      font-weight: 800;
      text-align: right;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--sub);
      font-size: 12px;
      font-weight: 800;
    }

    input[type="number"],
    select {
      width: 100%;
      height: 38px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 0 10px;
      font-size: 13px;
      outline: none;
      background: white;
    }

    input[type="number"]:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }



    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button.btn {
      height: 40px;
      border: 0;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      transition: .15s ease;
    }

    .btn.primary {
      background: var(--blue);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--blue-hover);
    }

    .btn.green {
      background: var(--green);
      color: #fff;
    }

    .btn.green:hover {
      background: var(--green-hover);
    }

    .btn.light {
      background: #eef2f7;
      color: #253044;
    }

    .btn.light:hover {
      background: #e5e7eb;
    }

    .btn.red {
      background: #fee2e2;
      color: #b91c1c;
    }

    .btn.red:hover {
      background: #fecaca;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }


    details.advanced {
      margin: 10px 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fafafa;
      overflow: hidden;
    }

    details.advanced summary {
      height: 38px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #374151;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    details.advanced summary::-webkit-details-marker {
      display: none;
    }

    details.advanced summary::after {
      content: "展开";
      color: var(--sub);
      font-size: 12px;
      font-weight: 700;
    }

    details.advanced[open] summary::after {
      content: "收起";
    }

    .advanced-body {
      padding: 0 10px 10px;
      border-top: 1px solid var(--line);
    }

    .tip {
      margin-top: 8px;
      padding: 9px 10px;
      border-radius: 10px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 12px;
      line-height: 1.55;
    }

    .download-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .download-btn {
      height: 54px;
      border: 0;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      transition: .15s ease;
      font-family: inherit;
    }

    .download-btn span {
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }

    .download-btn small {
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      opacity: .72;
    }

    .download-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .blue-download {
      background: linear-gradient(180deg, #2f6df4 0%, var(--blue) 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(37, 99, 235, .18);
    }

    .blue-download:hover:not(:disabled) {
      background: linear-gradient(180deg, #2b65df 0%, var(--blue-hover) 100%);
      transform: translateY(-1px);
    }

    .green-download {
      background: linear-gradient(180deg, #19b257 0%, var(--green) 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(22, 163, 74, .16);
    }

    .green-download:hover:not(:disabled) {
      background: linear-gradient(180deg, #17a34f 0%, var(--green-hover) 100%);
      transform: translateY(-1px);
    }

    .progress {
      display: none;
      margin-top: 10px;
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      color: var(--sub);
      font-size: 12px;
      font-weight: 700;
    }

    .bar {
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--blue);
      transition: width .18s ease;
    }

    .slice-list {
      max-height: 255px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-right: 2px;
    }

    .slice-item {
      min-height: 52px;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .slice-no {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      background: #eff6ff;
      font-size: 12px;
      font-weight: 900;
    }

    .slice-info b {
      display: block;
      margin-bottom: 2px;
      font-size: 12px;
    }

    .slice-info span {
      color: var(--sub);
      font-size: 11px;
    }

    .status {
      padding: 4px 7px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.ok {
      background: #dcfce7;
      color: #166534;
    }

    .status.bad {
      background: #fee2e2;
      color: #991b1b;
    }

    .footer {
      color: var(--sub);
      font-size: 12px;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      max-width: min(680px, calc(100vw - 36px));
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(17, 24, 39, .94);
      color: white;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      transition: .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .side {
        position: static;
      }
      .preview-area {
        height: 620px;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
      }
      .topbar {
        grid-template-columns: 1fr;
        align-items: flex-start;
        padding: 14px;
      }
      .brand {
        align-items: center;
      }
      .brand span {
        white-space: normal;
      }
      .tool-title {
        text-align: left;
        min-width: 0;
      }
      .layout {
        gap: 12px;
      }
      .grid-2,
      .btn-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">

    const progressPercent = document.getElementById('progressPercent');
    const progressBar = document.getElementById('progressBar');
    const toast = document.getElementById('toast');

    let sourceFile = null;
    let sourceUrl = '';
    let imgReady = false;
    let cuts = [];
    let draggingIndex = null;
    let dragActive = false;
    let lastExportInfo = new Map();

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 2100);
    }

    function bytesToSize(bytes) {
      if (!Number.isFinite(bytes)) return '-';
      if (bytes < 1024) return bytes + 'B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
      return (bytes / 1024 / 1024).toFixed(2) + 'MB';
    }

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function getScale() {
      if (!imgReady || !previewImg.naturalHeight) return 1;
      return previewImg.clientHeight / previewImg.naturalHeight;
    }

    function clientYToImageY(clientY) {
      const rect = overlay.getBoundingClientRect();
      const scale = getScale();
      return clampCutY((clientY - rect.top) / scale);
    }

    function clampCutY(y) {
      const h = previewImg.naturalHeight || 1;
      return Math.max(1, Math.min(h - 1, Math.round(y)));
    }

    function normalizeCuts() {
      const h = previewImg.naturalHeight || 0;
      const unique = Array.from(new Set(cuts.map(v => Math.round(v))));
      cuts = unique.filter(v => v > 0 && v < h).sort((a, b) => a - b);
    }

    function getSegments() {
      if (!imgReady) return [];
      normalizeCuts();
      const points = [0, ...cuts, previewImg.naturalHeight];
      const segments = [];

      for (let i = 0; i < points.length - 1; i++) {
        const y = points[i];
        const next = points[i + 1];
        const height = next - y;
        if (height > 0) {
          segments.push({
            index: i + 1,
            y,
            height,
            width: previewImg.naturalWidth
          });
        }
      }

      return segments;
    }

    function renderOverlay() {
      overlay.innerHTML = '';
      if (!imgReady) return;

      const scale = getScale();
      const segments = getSegments();

      segments.forEach((seg, index) => {
        const band = document.createElement('div');
        band.className = 'slice-band';
        band.style.top = `${seg.y * scale}px`;
        band.style.height = `${seg.height * scale}px`;
        band.style.opacity = index % 2 === 0 ? '.95' : '.5';
        overlay.appendChild(band);
      });

      cuts.forEach((y, index) => {
        const line = document.createElement('div');
        line.className = 'cut-line';
        line.style.top = `${y * scale}px`;
        line.dataset.index = String(index);

        const label = document.createElement('div');
        label.className = 'line-label';
        label.innerHTML = `<span class="line-handle">↕</span><span>${Math.round(y)}px</span>`;

        const del = document.createElement('button');
        del.className = 'line-delete';
        del.type = 'button';
        del.textContent = '×';
        del.title = '删除这条切线';
        del.addEventListener('pointerdown', e => e.stopPropagation());
        del.addEventListener('click', e => {
          e.stopPropagation();
          cuts.splice(index, 1);
          lastExportInfo.clear();
          updateAll();
        });

        label.appendChild(del);
        line.appendChild(label);
        overlay.appendChild(line);
      });
    }

    function renderSliceList() {
      const segments = getSegments();
      sliceCountLabel.textContent = segments.length ? `${segments.length} 片` : '0 片';
      metaSlices.textContent = segments.length ? `${segments.length} 片` : '-';
      exportBtn.disabled = !imgReady || segments.length === 0;
      exportOriginalBtn.disabled = !imgReady || segments.length === 0;

      if (!imgReady) {
        sliceList.innerHTML = '<div class="footer">上传后显示切片信息。</div>';
        return;
      }

      sliceList.innerHTML = '';

      segments.forEach(seg => {
        const info = lastExportInfo.get(seg.index);
        const statusClass = info ? (info.ok ? 'ok' : 'bad') : '';
        const statusText = info ? (info.ok ? bytesToSize(info.size) : `${bytesToSize(info.size)} 超出`) : '待导出';

        const item = document.createElement('div');
        item.className = 'slice-item';
        item.innerHTML = `
          <div class="slice-no">${pad2(seg.index)}</div>
          <div class="slice-info">
            <b>${seg.width} × ${seg.height}px</b>
            <span>${seg.y}px - ${seg.y + seg.height}px</span>
          </div>
          <div class="status ${statusClass}">${statusText}</div>
        `;
        sliceList.appendChild(item);
      });
    }

    function updateMeta() {
      if (!imgReady || !sourceFile) return;
      metaBox.style.display = 'block';
      metaSize.textContent = `${previewImg.naturalWidth} × ${previewImg.naturalHeight}px`;
      metaWeight.textContent = bytesToSize(sourceFile.size);
      metaSlices.textContent = `${getSegments().length} 片`;
    }

    function updateAll() {
      normalizeCuts();
      renderOverlay();
      renderSliceList();
      updateMeta();
    }

    function beginDrag(index, pointerId, captureEl) {
      draggingIndex = index;
      dragActive = true;
      try { captureEl.setPointerCapture(pointerId); } catch (err) {}
    }

    function moveCurrentLine(clientY) {
      if (!dragActive || draggingIndex === null || !imgReady) return;
      cuts[draggingIndex] = clientYToImageY(clientY);
      lastExportInfo.clear();
      updateAll();
    }

    function endDrag(pointerId, captureEl) {
      if (!dragActive) return;
      dragActive = false;
      draggingIndex = null;
      try { captureEl.releasePointerCapture(pointerId); } catch (err) {}
      updateAll();
    }

    function loadImageFile(file, successText = '上传成功：点击图片添加切线') {
      if (!file) return;

      if (!file.type || !file.type.startsWith('image/')) {
        showToast('请上传图片文件');
        return;
      }

      sourceFile = file;
      if (sourceUrl) URL.revokeObjectURL(sourceUrl);
      sourceUrl = URL.createObjectURL(file);

      imgReady = false;
      cuts = [];
      lastExportInfo.clear();
      progressWrap.style.display = 'none';

      previewImg.onload = () => {
        imgReady = true;
        emptyState.style.display = 'none';
        previewWrap.style.display = 'block';
        previewHint.textContent = '点哪里，就从哪里切';
        requestAnimationFrame(updateAll);
        showToast(successText);
      };

      previewImg.src = sourceUrl;
    }

    fileInput.addEventListener('change', event => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      loadImageFile(file);
      fileInput.value = '';
    });

    uploadTriggerBtn.addEventListener('click', () => fileInput.click());
    emptyState.addEventListener('click', () => fileInput.click());
    emptyState.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        fileInput.click();
      }
    });

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
      previewArea.addEventListener(name, event => {
        event.preventDefault();
        event.stopPropagation();
      });
    });

    ['dragenter', 'dragover'].forEach(name => {
      previewArea.addEventListener(name, () => {
        previewArea.classList.add('drop-active');
      });
    });

    ['dragleave', 'drop'].forEach(name => {
      previewArea.addEventListener(name, () => {
        previewArea.classList.remove('drop-active');
      });
    });

    previewArea.addEventListener('drop', event => {
      const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
      if (!file) return;
      loadImageFile(file, '上传成功：点击图片添加切线');
    });

    document.addEventListener('paste', event => {
      const items = event.clipboardData && event.clipboardData.items ? Array.from(event.clipboardData.items) : [];
      const imageItem = items.find(item => item.type && item.type.startsWith('image/'));
      if (!imageItem) return;
      const file = imageItem.getAsFile();
      if (!file) return;
      loadImageFile(file, '已粘贴图片：点击图片添加切线');
    });


    overlay.addEventListener('pointerdown', event => {
      if (!imgReady) return;

      const line = event.target.closest('.cut-line');

      if (line) {
        event.preventDefault();
        beginDrag(Number(line.dataset.index), event.pointerId, overlay);
        return;
      }

      const y = clientYToImageY(event.clientY);
      cuts.push(y);
      lastExportInfo.clear();
      updateAll();
      showToast('已添加切线，可继续拖动微调');
    });

    overlay.addEventListener('pointermove', event => {
      moveCurrentLine(event.clientY);
    });

    overlay.addEventListener('pointerup', event => endDrag(event.pointerId, overlay));
    overlay.addEventListener('pointercancel', event => endDrag(event.pointerId, overlay));

    previewWidth.addEventListener('input', () => {
      document.documentElement.style.setProperty('--preview-width', `${previewWidth.value}px`);
      if (imgReady) requestAnimationFrame(renderOverlay);
    });

    window.addEventListener('resize', () => {
      if (imgReady) renderOverlay();
    });

    autoSplitBtn.addEventListener('click', () => {
      if (!imgReady) {
        showToast('请先上传详情图');
        return;
      }

      const n = Math.max(2, Math.min(80, Number(splitCount.value) || 2));
      const h = previewImg.naturalHeight;
      cuts = [];

      for (let i = 1; i < n; i++) {
        cuts.push(Math.round(h * i / n));
      }

      lastExportInfo.clear();
      updateAll();
      showToast(`已平均切成 ${n} 片`);
    });

    undoBtn.addEventListener('click', () => {
      if (!cuts.length) return;
      cuts.pop();
      lastExportInfo.clear();
      updateAll();
    });

    clearBtn.addEventListener('click', () => {
      if (!cuts.length) return;
      cuts = [];
      lastExportInfo.clear();
      updateAll();
      showToast('已清空切线');
    });



    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (!blob) {
            reject(new Error('图片压缩失败，浏览器可能不支持当前格式'));
          } else {
            resolve(blob);
          }
        }, type, quality);
      });
    }

    async function compressSegment(seg, type, maxBytes) {
      if (
        sourceFile &&
        sourceFile.type === 'image/jpeg' &&
        sourceFile.size <= maxBytes &&
        seg.y === 0 &&
        seg.width === previewImg.naturalWidth &&
        seg.height === previewImg.naturalHeight
      ) {
        return { blob: sourceFile, quality: 1, ok: true, skippedCompression: true };
      }

      const canvas = document.createElement('canvas');
      canvas.width = seg.width;
      canvas.height = seg.height;

      const ctx = canvas.getContext('2d', { alpha: type !== 'image/jpeg' });

      if (type === 'image/jpeg') {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      ctx.drawImage(
        previewImg,
        0, seg.y, seg.width, seg.height,
        0, 0, seg.width, seg.height
      );

      const originalLikeBlob = await canvasToBlob(canvas, type, 1);

      if (originalLikeBlob.size <= maxBytes) {
        return { blob: originalLikeBlob, quality: 1, ok: true, skippedCompression: true };
      }

      let low = .08;
      let high = 1;
      let best = await canvasToBlob(canvas, type, low);

      if (best.size > maxBytes) {
        return { blob: best, quality: low, ok: false, skippedCompression: false };
      }

      for (let i = 0; i < 12; i++) {
        const mid = (low + high) / 2;
        const blob = await canvasToBlob(canvas, type, mid);

        if (blob.size <= maxBytes) {
          best = blob;
          low = mid;
        } else {
          high = mid;
        }
      }

      return { blob: best, quality: low, ok: true, skippedCompression: false };
    }

    async function renderOriginalSegment(seg) {
      if (
        sourceFile &&
        sourceFile.type === 'image/jpeg' &&
        seg.y === 0 &&
        seg.width === previewImg.naturalWidth &&
        seg.height === previewImg.naturalHeight
      ) {
        return sourceFile;
      }

      const canvas = document.createElement('canvas');
      canvas.width = seg.width;
      canvas.height = seg.height;

      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(
        previewImg,
        0, seg.y, seg.width, seg.height,
        0, 0, seg.width, seg.height
      );

      return await canvasToBlob(canvas, 'image/jpeg', 1);
    }

    function makeCrcTable() {
      const table = new Uint32Array(256);

      for (let i = 0; i < 256; i++) {
        let c = i;

        for (let j = 0; j < 8; j++) {
          c = ((c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1));
        }

        table[i] = c >>> 0;
      }

      return table;
    }

    const crcTable = makeCrcTable();

    function crc32(data) {
      let crc = 0xffffffff;

      for (let i = 0; i < data.length; i++) {
        crc = crcTable[(crc ^ data[i]) & 0xff] ^ (crc >>> 8);
      }

      return (crc ^ 0xffffffff) >>> 0;
    }

    function dosTimeDate(date = new Date()) {
      const time = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
      const dosDate = ((date.getFullYear() - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate();
      return { time, date: dosDate };
    }

    function writeU16(view, offset, value) {
      view.setUint16(offset, value, true);
    }

    function writeU32(view, offset, value) {
      view.setUint32(offset, value, true);
    }

    async function createZip(files) {
      const encoder = new TextEncoder();
      const localParts = [];
      const centralParts = [];
      let offset = 0;
      const stamp = dosTimeDate();

      for (const file of files) {
        const nameBytes = encoder.encode(file.name);
        const data = new Uint8Array(await file.blob.arrayBuffer());
        const crc = crc32(data);

        const localHeader = new Uint8Array(30 + nameBytes.length);
        const localView = new DataView(localHeader.buffer);

        writeU32(localView, 0, 0x04034b50);
        writeU16(localView, 4, 20);
        writeU16(localView, 6, 0);
        writeU16(localView, 8, 0);
        writeU16(localView, 10, stamp.time);
        writeU16(localView, 12, stamp.date);
        writeU32(localView, 14, crc);
        writeU32(localView, 18, data.length);
        writeU32(localView, 22, data.length);
        writeU16(localView, 26, nameBytes.length);
        writeU16(localView, 28, 0);
        localHeader.set(nameBytes, 30);
        localParts.push(localHeader, data);

        const centralHeader = new Uint8Array(46 + nameBytes.length);
        const centralView = new DataView(centralHeader.buffer);

        writeU32(centralView, 0, 0x02014b50);
        writeU16(centralView, 4, 20);
        writeU16(centralView, 6, 20);
        writeU16(centralView, 8, 0);
        writeU16(centralView, 10, 0);
        writeU16(centralView, 12, stamp.time);
        writeU16(centralView, 14, stamp.date);
        writeU32(centralView, 16, crc);
        writeU32(centralView, 20, data.length);
        writeU32(centralView, 24, data.length);
        writeU16(centralView, 28, nameBytes.length);
        writeU16(centralView, 30, 0);
        writeU16(centralView, 32, 0);
        writeU16(centralView, 34, 0);
        writeU16(centralView, 36, 0);
        writeU32(centralView, 38, 0);
        writeU32(centralView, 42, offset);
        centralHeader.set(nameBytes, 46);
        centralParts.push(centralHeader);

        offset += localHeader.length + data.length;
      }

      const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
      const endHeader = new Uint8Array(22);
      const endView = new DataView(endHeader.buffer);

      writeU32(endView, 0, 0x06054b50);
      writeU16(endView, 4, 0);
      writeU16(endView, 6, 0);
      writeU16(endView, 8, files.length);
      writeU16(endView, 10, files.length);
      writeU32(endView, 12, centralSize);
      writeU32(endView, 16, offset);
      writeU16(endView, 20, 0);

      return new Blob([...localParts, ...centralParts, endHeader], { type: 'application/zip' });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');

      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function setProgress(current, total, text) {
      const pct = total ? Math.round(current / total * 100) : 0;
      progressWrap.style.display = 'block';
      progressText.textContent = text || '处理中...';
      progressPercent.textContent = `${pct}%`;
      progressBar.style.width = `${pct}%`;
    }

    exportOriginalBtn.addEventListener('click', async () => {
      if (!imgReady) {
        showToast('请先上传详情图');
        return;
      }

      const segments = getSegments();

      if (!segments.length) return;

      exportOriginalBtn.disabled = true;
      exportBtn.disabled = true;
      autoSplitBtn.disabled = true;
      undoBtn.disabled = true;
      clearBtn.disabled = true;
      progressWrap.style.display = 'none';

      try {
        const files = [];

        for (let i = 0; i < segments.length; i++) {
          const seg = segments[i];
          setProgress(i, segments.length, `处理第 ${i + 1} / ${segments.length} 张`);
          await new Promise(resolve => setTimeout(resolve, 20));

          const blob = await renderOriginalSegment(seg);

          files.push({
            name: `slice_${pad2(seg.index)}.jpg`,
            blob
          });
        }

        setProgress(segments.length, segments.length, '打包 ZIP');
        const zipBlob = await createZip(files);
        const baseName = sourceFile ? sourceFile.name.replace(/\.[^.]+$/, '') : 'detail';
        downloadBlob(zipBlob, `${baseName}_original_slices.zip`);
        showToast('原图切片导出完成');
      } catch (err) {
        console.error(err);
        showToast(err.message || '导出失败，请换一张图后重试');
      } finally {
        exportOriginalBtn.disabled = false;
        exportBtn.disabled = false;
        autoSplitBtn.disabled = false;
        undoBtn.disabled = false;
        clearBtn.disabled = false;
      }
    });

    exportBtn.addEventListener('click', async () => {
      if (!imgReady) {
        showToast('请先上传详情图');
        return;
      }

      const maxBytes = 195 * 1024;
      const type = 'image/jpeg';
      const ext = 'jpg';
      const segments = getSegments();

      if (!segments.length) return;

      exportBtn.disabled = true;
      exportOriginalBtn.disabled = true;
      autoSplitBtn.disabled = true;
      undoBtn.disabled = true;
      clearBtn.disabled = true;
      lastExportInfo.clear();
      renderSliceList();

      try {
        const files = [];
        let oversizeCount = 0;

        for (let i = 0; i < segments.length; i++) {
          const seg = segments[i];
          setProgress(i, segments.length, `处理第 ${i + 1} / ${segments.length} 张`);
          await new Promise(resolve => setTimeout(resolve, 20));

          const result = await compressSegment(seg, type, maxBytes);

          if (!result.ok) oversizeCount++;

          lastExportInfo.set(seg.index, {
            ok: result.ok,
            size: result.blob.size,
            quality: result.quality
          });

          files.push({
            name: `slice_${pad2(seg.index)}.${ext}`,
            blob: result.blob
          });

          renderSliceList();
        }

        setProgress(segments.length, segments.length, '打包 ZIP');
        const zipBlob = await createZip(files);
        const baseName = sourceFile ? sourceFile.name.replace(/\.[^.]+$/, '') : 'detail';
        downloadBlob(zipBlob, `${baseName}_slices.zip`);

        if (oversizeCount > 0) {
          showToast(`已导出，但有 ${oversizeCount} 张仍超过目标大小，建议把这些切片切短一点`);
        } else {
          showToast('导出完成：所有切片均已压缩到目标大小以内');
        }
      } catch (err) {
        console.error(err);
        showToast(err.message || '导出失败，请减少单张切片高度后重试');
      } finally {
        exportBtn.disabled = false;
        exportOriginalBtn.disabled = false;
        autoSplitBtn.disabled = false;
        undoBtn.disabled = false;
        clearBtn.disabled = false;
      }
    });
  </script>
</body>
